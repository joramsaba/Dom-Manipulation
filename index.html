<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Interactive Profile System</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    min-height: 100vh;

    display: flex;
    justify-content: center;
    align-items: flex-start;

    background: linear-gradient(135deg, #0f2027, #2c5364, #00c9a7);
    color: #ffffff;
}

/* MAIN CONTAINER */
.container {
    width: 90%;
    max-width: 700px;
    margin-top: 40px;
    text-align: center;
}

/* CARD SECTIONS */
.section {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(12px);
    margin-top: 20px;
    padding: 20px;
    border-radius: 16px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.25);
}

/* PROFILE */
.profile-wrapper {
    display: flex;
    justify-content: center;
    margin-bottom: 10px;
}

.profile-wrapper img {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: 4px solid #00c9a7;
    cursor: pointer;
    object-fit: cover;
    transition: 0.3s;
}

.profile-wrapper img:hover {
    transform: scale(1.05);
}

/* TEXT */
h1 {
    margin: 10px 0 5px;
}

p {
    opacity: 0.85;
}

/* BUTTONS */
button {
    margin: 6px;
    padding: 8px 14px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #00c9a7, #007cf0);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: translateY(-2px);
    opacity: 0.9;
}

/* LIST */
ul {
    padding: 0;
}

li {
    list-style: none;
    padding: 10px;
    margin: 6px 0;
    background: rgba(255,255,255,0.12);
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
}

li:hover {
    background: rgba(0, 201, 167, 0.6);
}

.selected {
    background: #00c9a7 !important;
}

/* INPUT */
input {
    margin-top: 10px;
    padding: 8px;
    border-radius: 8px;
    border: none;
    outline: none;
    width: 80%;
    text-align: center;
}
</style>
</head>

<body>

<div class="container">

<!-- PROFILE -->
<div class="section">

<input type="file" id="picInput" hidden>

<div class="profile-wrapper">
   <img id="profilePic" src="https://via.placeholder.com/150">
</div>

<h1 id="nameText">Joram Piloneo Saba</h1>
<button onclick="editName()"><i class="fa fa-pen"></i> Edit Name</button>

<p id="bioText">Life is short. Make the best out of it.</p>
<button onclick="editBio()"><i class="fa fa-pen"></i> Edit Bio</button>

</div>

<!-- SKILLS -->
<div class="section">
<h2>Skills</h2>
<ul id="skillsList">
    <li draggable="true">HTML</li>
    <li draggable="true">CSS</li>
    <li draggable="true">JavaScript</li>
</ul>

<input id="skillInput" style="display:none;" placeholder="Add skill">
<br>
<button onclick="showSkillInput()">Add Skill</button>
<button onclick="deleteSelected('skillsList')">Delete</button>
</div>

<!-- EDUCATION -->
<div class="section">
<h2>Education</h2>
<ul id="eduList">
    <li draggable="true">PSU (Goa Campus) | BSIT-2D | 2026</li>
</ul>

<input id="eduInput" style="display:none;" placeholder="Add education">
<br>
<button onclick="showEduInput()">Add Education</button>
<button onclick="deleteSelected('eduList')">Delete</button>
</div>

<!-- HOBBIES -->
<div class="section">
<h2>Hobbies</h2>
<ul id="hobbyList">
    <li draggable="true">Drawing</li>
    <li draggable="true">Singing</li>
    <li draggable="true">Dancing</li>
    <li draggable="true">Martial Arts</li>
    <li draggable="true">Story maker</li>
</ul>

<input id="hobbyInput" style="display:none;" placeholder="Add hobby">
<br>
<button onclick="showHobbyInput()">Add Hobby</button>
<button onclick="deleteSelected('hobbyList')">Delete</button>
</div>

<!-- RESET -->
<button onclick="resetAll()"><i class="fa fa-rotate"></i> Reset</button>

</div>

<script>

let dragged;

// IMAGE CLICK
document.getElementById("profilePic").onclick = () => {
    document.getElementById("picInput").click();
};

document.getElementById("picInput").onchange = e => {
    let file = e.target.files[0];
    if(!file) return;

    let reader = new FileReader();
    reader.onload = () => {
        document.getElementById("profilePic").src = reader.result;
        save();
    };
    reader.readAsDataURL(file);
};

// NAME
function editName(){
    let el = document.getElementById("nameText");
    let input = document.createElement("input");
    input.value = el.innerText;
    el.replaceWith(input);

    input.onblur = input.onkeydown = e => {
        if(e.type === "blur" || e.key === "Enter"){
            let h = document.createElement("h1");
            h.id = "nameText";
            h.innerText = input.value;
            input.replaceWith(h);
            save();
        }
    };
}

// BIO
function editBio(){
    let el = document.getElementById("bioText");
    let input = document.createElement("input");
    input.value = el.innerText;
    el.replaceWith(input);

    input.onblur = input.onkeydown = e => {
        if(e.type === "blur" || e.key === "Enter"){
            let p = document.createElement("p");
            p.id = "bioText";
            p.innerText = input.value;
            input.replaceWith(p);
            save();
        }
    };
}

// ADD INPUTS
function showSkillInput(){
    let i = document.getElementById("skillInput");
    i.style.display = "block";

    i.onkeydown = e=>{
        if(e.key === "Enter"){
            addItem("skillsList", i.value);
            i.value = "";
            i.style.display = "none";
        }
    };
}

function showEduInput(){
    let i = document.getElementById("eduInput");
    i.style.display = "block";

    i.onkeydown = e=>{
        if(e.key === "Enter"){
            addItem("eduList", i.value);
            i.value = "";
            i.style.display = "none";
        }
    };
}

function showHobbyInput(){
    let i = document.getElementById("hobbyInput");
    i.style.display = "block";

    i.onkeydown = e=>{
        if(e.key === "Enter"){
            addItem("hobbyList", i.value);
            i.value = "";
            i.style.display = "none";
        }
    };
}

// ADD ITEM
function addItem(listId,value){
    if(!value.trim()) return;

    let li = document.createElement("li");
    li.innerText = value;
    li.draggable = true;

    document.getElementById(listId).appendChild(li);

    save();
    attach();
}

// DELETE
function deleteSelected(listId){
    document.querySelectorAll("#"+listId+" .selected")
    .forEach(el=> el.remove());

    save();
}

// DRAG + CLICK
function attach(){
    document.querySelectorAll("li").forEach(li=>{
        li.onclick = ()=> li.classList.toggle("selected");

        li.ondragstart = ()=> dragged = li;

        li.ondragover = e => e.preventDefault();

        li.ondrop = e=>{
            e.preventDefault();
            if(li.parentNode === dragged.parentNode){
                li.parentNode.insertBefore(dragged, li);
                save();
            }
        };
    });
}

// SAVE
function save(){
    localStorage.setItem("profile", document.body.innerHTML);
}

// LOAD
window.onload = ()=>{
    let data = localStorage.getItem("profile");
    if(data) document.body.innerHTML = data;
    attach();
};

// RESET
function resetAll(){
    localStorage.clear();
    location.reload();
}

</script>

</body>
</html>
